class: SectionMembership
table: section_memberships
fields:
  id: UuidValue?, defaultPersist=random_v7
  member: Member?, relation
  # sectionId: int, relation(parent=sections, onDelete=cascade)
  section: Section?, relation
  externalUserId: String?
  syncedAt: DateTime, default=now
  sourceSystem: String?
  scopes: Set<String>
  # We simplify this by having the notifications be blanket for all sections.
  # sendNewEventNotifications: bool, default=false
indexes:
  user_section_unique_idx:
    fields: memberId, sectionId
    unique: true
