class: Event
table: events
fields:
  id: UuidValue?, defaultPersist=random_v7
  title: String
  description: String
  type: String
  startTime: DateTime
  endTime: DateTime
  eventLocation: String?
  carpoolLocation: String?

  carpoolTime: DateTime?
  # Registration management
  registrationDeadline: DateTime?
  registrationStartDate: DateTime?
  registrationFee: double?
  requiresApproval: bool, default=true
  minimumParticipants: int, default=0
  maxParticipants: int, default=8
  cancellationDeadline: DateTime?
  cancelled: bool, default=false
  section: Section?, relation
  # Whether it is visible on the public event list
  published: bool, default=false
  eventRegistrations: List<EventRegistration>?, relation(name=event_registrations)
  eventManagers: List<EventManager>?, relation(name=event_managers)
  updatedAt: DateTime, default=now

indexes:
  upcoming_events_idx:
    fields: startTime
  section_idx:
    fields: sectionId
