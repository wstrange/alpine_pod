class: Member
table: members
fields:
  user: module:serverpod_auth_core:AuthUser?, relation(onDelete=Cascade)
  firstName: String
  lastName: String
  displayName: String?
  bio: String?
  email: String
  phoneNumber: String
  membershipStatus: String, default="active"
  profilePictureUrl: String?
  emergencyContactName: String
  emergencyContactPhone: String
  medicalConditions: String?
  waiverSignedDate: DateTime, default=1970-01-01T00:00:00.000Z
  # certifications and skills stored as JSON-encoded arrays in strings
  certifications: String?
  createdAt: DateTime, default=now
  updatedAt: DateTime, default=now
  registrations: List<EventRegistration>?, relation(name=member_registrations)
  managedEvents: List<EventManager>?, relation(name=member_managers)
indexes:
  authuser_idx:
    fields: userId
    unique: true
  email_idx:
    fields: email
    unique: true