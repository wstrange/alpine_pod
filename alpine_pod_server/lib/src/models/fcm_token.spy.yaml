class: FcmToken
table: fcm_tokens
fields:
  id: UuidValue?, defaultPersist=random_v7
  user: module:serverpod_auth_core:AuthUser?, relation(onDelete=Cascade)
  token: String
  deviceId: String?
  updatedAt: DateTime, default=now
indexes:
  token_idx:
    fields: token
    unique: true
  fcm_user_idx:
    fields: userId
